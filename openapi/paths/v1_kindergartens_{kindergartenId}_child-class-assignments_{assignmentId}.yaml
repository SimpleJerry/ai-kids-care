get:
  tags:
    - Classes
    - Children
  security:
    - bearerAuth: []
  summary: Get child-class assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChildClassAssignment.yaml
patch:
  tags:
    - Classes
    - Children
  security:
    - bearerAuth: []
  summary: Update child-class assignment (end/close or edit metadata)
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateChildClassAssignmentRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChildClassAssignment.yaml
delete:
  tags:
    - Classes
    - Children
  security:
    - bearerAuth: []
  summary: Delete child-class assignment
  description: Use only for admin fixes; prefer ending via PATCH.
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '204':
      description: No Content
