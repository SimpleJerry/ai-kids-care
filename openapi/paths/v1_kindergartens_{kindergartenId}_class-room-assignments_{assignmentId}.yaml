get:
  tags:
    - Classes
    - Rooms
  security:
    - bearerAuth: []
  summary: Get class-room assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClassRoomAssignment.yaml
patch:
  tags:
    - Classes
    - Rooms
  security:
    - bearerAuth: []
  summary: Update class-room assignment (end/close or edit purpose/note)
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateClassRoomAssignmentRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClassRoomAssignment.yaml
delete:
  tags:
    - Classes
    - Rooms
  security:
    - bearerAuth: []
  summary: Delete class-room assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '204':
      description: No Content
