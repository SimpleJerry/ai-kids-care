get:
  tags:
    - Rooms
    - Cameras
  security:
    - bearerAuth: []
  summary: Get room-camera assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RoomCameraAssignment.yaml
patch:
  tags:
    - Rooms
    - Cameras
  security:
    - bearerAuth: []
  summary: Update room-camera assignment (end/close)
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateRoomCameraAssignmentRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RoomCameraAssignment.yaml
delete:
  tags:
    - Rooms
    - Cameras
  security:
    - bearerAuth: []
  summary: Delete room-camera assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '204':
      description: No Content
