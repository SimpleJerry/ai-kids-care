get:
  tags:
    - Classes
    - Teachers
  security:
    - bearerAuth: []
  summary: Get class-teacher assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClassTeacherAssignment.yaml
patch:
  tags:
    - Classes
    - Teachers
  security:
    - bearerAuth: []
  summary: Update class-teacher assignment (end/close or edit role)
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateClassTeacherAssignmentRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClassTeacherAssignment.yaml
delete:
  tags:
    - Classes
    - Teachers
  security:
    - bearerAuth: []
  summary: Delete class-teacher assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/AssignmentIdPath.yaml
  responses:
    '204':
      description: No Content
