get:
  tags:
    - Classes
    - Children
  security:
    - bearerAuth: []
  summary: List child-class assignments
  description: >
    Backed by child_class_assignment. Use for history queries or current
    placement.
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: childId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: classId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: status
      in: query
      required: false
      schema:
        $ref: ../components/schemas/StatusEnum.yaml
    - name: activeAt
      in: query
      required: false
      schema:
        type: string
        format: date
      description: >-
        Return assignments where startDate <= activeAt and (endDate is null or
        endDate >= activeAt).
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/ChildClassAssignment.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
post:
  tags:
    - Classes
    - Children
  security:
    - bearerAuth: []
  summary: Create child-class assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateChildClassAssignmentRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChildClassAssignment.yaml
    '409':
      description: Conflict (overlapping assignment, etc.)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
