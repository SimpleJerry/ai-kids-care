post:
  tags:
    - Auth
  security: []
  summary: Reset password with reset token
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ResetPasswordRequest.yaml
  responses:
    '204':
      description: No Content
    '400':
      description: Invalid token / weak password
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
