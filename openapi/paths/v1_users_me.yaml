get:
  tags:
    - Users
  security:
    - bearerAuth: []
  summary: Get current user
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UserAccount.yaml
patch:
  tags:
    - Users
  security:
    - bearerAuth: []
  summary: Update current user (limited fields)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateUserAccountRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UserAccount.yaml
