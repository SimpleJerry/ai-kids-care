post:
  tags:
    - Auth
  security:
    - bearerAuth: []
  summary: Change password (current password required)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ChangePasswordRequest.yaml
  responses:
    '204':
      description: No Content
    '401':
      description: Unauthorized / password mismatch
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
