get:
  tags:
    - Classes
    - Rooms
  security:
    - bearerAuth: []
  summary: List class-room assignments
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: classId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: roomId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: status
      in: query
      required: false
      schema:
        $ref: ../components/schemas/StatusEnum.yaml
    - name: activeAt
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: >-
        Return assignments where startAt <= activeAt and (endAt is null or endAt
        >= activeAt).
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/ClassRoomAssignment.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
post:
  tags:
    - Classes
    - Rooms
  security:
    - bearerAuth: []
  summary: Create class-room assignment
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateClassRoomAssignmentRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClassRoomAssignment.yaml
    '409':
      description: Conflict (overlap)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
