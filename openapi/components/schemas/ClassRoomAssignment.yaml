type: object
required:
  - assignmentId
  - kindergartenId
  - classId
  - roomId
  - startAt
  - status
  - createdAt
  - updatedAt
properties:
  assignmentId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  classId:
    type: integer
    format: int64
  roomId:
    type: integer
    format: int64
  startAt:
    type: string
    format: date-time
  endAt:
    type: string
    format: date-time
    nullable: true
  purpose:
    type: string
    nullable: true
  note:
    type: string
    nullable: true
  status:
    $ref: ./StatusEnum.yaml
  createdByUserId:
    type: integer
    format: int64
    nullable: true
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
