type: object
required:
  - sessionId
  - kindergartenId
  - cameraId
  - modelId
  - startedAt
  - status
properties:
  sessionId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  cameraId:
    type: integer
    format: int64
  modelId:
    type: integer
    format: int64
  startedAt:
    type: string
    format: date-time
  endedAt:
    type: string
    format: date-time
    nullable: true
  status:
    $ref: ./StatusEnum.yaml
  avgLatencyMs:
    type: integer
    nullable: true
  inferenceFps:
    type: number
    format: float
    nullable: true
