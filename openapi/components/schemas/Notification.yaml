type: object
required:
  - notificationId
  - kindergartenId
  - eventId
  - recipientUserId
  - channel
  - title
  - body
  - status
  - createdAt
properties:
  notificationId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  eventId:
    type: integer
    format: int64
  recipientUserId:
    type: integer
    format: int64
  channel:
    type: string
    enum:
      - PUSH
      - SMS
      - EMAIL
  title:
    type: string
  body:
    type: string
  status:
    $ref: ./StatusEnum.yaml
    description: >
      DB uses status_enum; semantics must be defined (e.g. ACTIVE=sent,
      PENDING=queued, DISABLED=failed).
  sentAt:
    type: string
    format: date-time
    nullable: true
  failReason:
    type: string
    nullable: true
  retryCount:
    type: integer
    nullable: true
  createdAt:
    type: string
    format: date-time
