type: object
required:
  - childId
  - kindergartenId
  - name
  - status
  - createdAt
  - updatedAt
properties:
  childId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  name:
    type: string
  childNo:
    type: string
    nullable: true
  rrnFirst6:
    type: string
    nullable: true
    description: First 6 digits (DOB) for lookup; sensitive.
  birthDate:
    type: string
    format: date
    nullable: true
  gender:
    type: string
    nullable: true
  address:
    type: string
    nullable: true
  enrollDate:
    type: string
    format: date
    nullable: true
  leaveDate:
    type: string
    format: date
    nullable: true
  status:
    $ref: ./StatusEnum.yaml
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
