type: object
required:
  - assignmentId
  - kindergartenId
  - childId
  - classId
  - startDate
  - status
  - createdAt
  - updatedAt
properties:
  assignmentId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  childId:
    type: integer
    format: int64
  classId:
    type: integer
    format: int64
  startDate:
    type: string
    format: date
  endDate:
    type: string
    format: date
    nullable: true
  reason:
    type: string
    nullable: true
  note:
    type: string
    nullable: true
  status:
    $ref: ./StatusEnum.yaml
  createdByUserId:
    type: integer
    format: int64
    nullable: true
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
