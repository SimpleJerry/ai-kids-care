type: object
required:
  - roomId
  - kindergartenId
  - name
  - status
  - createdAt
  - updatedAt
properties:
  roomId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  name:
    type: string
  roomCode:
    type: string
    nullable: true
  locationNote:
    type: string
    nullable: true
  roomType:
    type: string
    nullable: true
  status:
    $ref: ./StatusEnum.yaml
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
