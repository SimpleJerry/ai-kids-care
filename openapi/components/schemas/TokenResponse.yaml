type: object
required:
  - accessToken
  - tokenType
  - expiresIn
  - refreshToken
properties:
  accessToken:
    type: string
  tokenType:
    type: string
    enum:
      - Bearer
  expiresIn:
    type: integer
    description: seconds
  refreshToken:
    type: string
  refreshExpiresIn:
    type: integer
    description: seconds
    nullable: true
