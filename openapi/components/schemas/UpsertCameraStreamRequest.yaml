type: object
required:
  - streamUrl
  - enabled
properties:
  streamUrl:
    type: string
  streamUser:
    type: string
    nullable: true
  streamPassword:
    type: string
    format: password
    nullable: true
    description: Server encrypts into stream_password_encrypted.
  protocol:
    type: string
    nullable: true
  fps:
    type: integer
    nullable: true
  resolution:
    type: string
    nullable: true
  enabled:
    type: boolean
