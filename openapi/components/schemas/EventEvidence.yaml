type: object
required:
  - evidenceId
  - eventId
  - kindergartenId
  - type
  - storageUri
  - createdAt
properties:
  evidenceId:
    type: integer
    format: int64
  eventId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  type:
    type: string
    enum:
      - IMAGE
      - VIDEO
  storageUri:
    type: string
  mimeType:
    type: string
    nullable: true
  createdAt:
    type: string
    format: date-time
  retentionUntil:
    type: string
    format: date-time
    nullable: true
  hold:
    type: boolean
    nullable: true
  hash:
    type: string
    nullable: true
