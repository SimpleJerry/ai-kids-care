type: object
required:
  - cameraId
  - streamUrl
  - enabled
  - createdAt
  - updatedAt
properties:
  cameraId:
    type: integer
    format: int64
  streamUrl:
    type: string
  streamUser:
    type: string
    nullable: true
  protocol:
    type: string
    nullable: true
    description: RTSP/HTTP etc.
  fps:
    type: integer
    nullable: true
  resolution:
    type: string
    nullable: true
  enabled:
    type: boolean
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
