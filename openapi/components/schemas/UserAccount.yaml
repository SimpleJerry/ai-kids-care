    type: integer
    format: int64
  loginId:
    type: string
    nullable: true
  email:
    type: string
    format: email
    nullable: true
  phone:
    type: string
    nullable: true
  status:
    $ref: ./StatusEnum.yaml
  lastLoginAt:
    type: string
    format: date-time
    nullable: true
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
