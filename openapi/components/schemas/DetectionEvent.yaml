type: object
required:
  - eventId
  - kindergartenId
  - cameraId
  - roomId
  - sessionId
  - eventType
  - detectedAt
  - status
properties:
  eventId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  cameraId:
    type: integer
    format: int64
  roomId:
    type: integer
    format: int64
  sessionId:
    type: integer
    format: int64
  eventType:
    type: string
  severity:
    type: integer
    nullable: true
  confidence:
    type: number
    format: float
    nullable: true
    minimum: 0
    maximum: 1
  detectedAt:
    type: string
    format: date-time
  startTime:
    type: string
    format: date-time
    nullable: true
  endTime:
    type: string
    format: date-time
    nullable: true
  status:
    $ref: ./StatusEnum.yaml
  createdAt:
    type: string
    format: date-time
    nullable: true
  updatedAt:
    type: string
    format: date-time
    nullable: true
