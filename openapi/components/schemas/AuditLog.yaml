type: object
required:
  - auditId
  - kindergartenId
  - userId
  - action
  - resourceType
  - createdAt
properties:
  auditId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  userId:
    type: integer
    format: int64
  action:
    type: string
  resourceType:
    type: string
  resourceId:
    type: integer
    format: int64
    nullable: true
  ip:
    type: string
    nullable: true
  userAgent:
    type: string
    nullable: true
  createdAt:
    type: string
    format: date-time
