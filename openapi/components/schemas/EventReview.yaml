type: object
required:
  - reviewId
  - eventId
  - kindergartenId
  - userId
  - action
  - resultStatus
  - createdAt
properties:
  reviewId:
    type: integer
    format: int64
  eventId:
    type: integer
    format: int64
  kindergartenId:
    type: integer
    format: int64
  userId:
    type: integer
    format: int64
  action:
    type: string
    description: 'DB: action varchar (ACK/RESOLVE/MARK_FALSE_POSITIVE/REOPEN etc.)'
  resultStatus:
    $ref: ./StatusEnum.yaml
  comment:
    type: string
    nullable: true
  createdAt:
    type: string
    format: date-time
