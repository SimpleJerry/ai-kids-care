services:
  pg16:
    image: postgres:16
    container_name: pg16-temp
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - ../../db/initdb/01_create_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s